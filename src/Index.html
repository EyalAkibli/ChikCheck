<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Chik-Check ⚡</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #111;
      color: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      transition: background-color 0.8s ease;
    }

    /* Persistent background — stays for the full action duration */
    body.bg-entry { background-color: #0d2e1a; }
    body.bg-exit  { background-color: #2e1f00; }

    /* Single soft flash overlay — pulses once, then vanishes */
    #flash-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      z-index: 999;
    }
    #flash-overlay.flash-green { background: #00c853; animation: pulse-once 0.7s ease-out forwards; }
    #flash-overlay.flash-amber { background: #ff8f00; animation: pulse-once 0.7s ease-out forwards; }
    #flash-overlay.flash-red   { background: #c62828; animation: pulse-once 0.7s ease-out forwards; }
    @keyframes pulse-once { 0% { opacity: 0.75; } 100% { opacity: 0; } }

    /* Form */
    h1 { font-size: 2rem; font-weight: 800; letter-spacing: -1px; color: #fff; margin-bottom: 0.2rem; }
    .tagline { font-size: 0.85rem; color: #666; margin-bottom: 2rem; }

    .card {
      background: #1c1c1e;
      border-radius: 16px;
      padding: 1.75rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    label {
      display: block;
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 10px;
      border: 1.5px solid #333;
      background: #2a2a2e;
      color: #fff;
      font-size: 1.1rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input:focus { border-color: #2563eb; }
    input::placeholder { color: #555; }

    button {
      width: 100%;
      padding: 1rem;
      border-radius: 10px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    button:hover:not(:disabled) { background: #1d4ed8; }
    button:active:not(:disabled) { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg { color: #ff8a80; font-size: 0.85rem; margin-top: 0.6rem; text-align: center; min-height: 1.2em; }

    /* Result screen */
    #result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 100%;
      max-width: 420px;
      padding: 2rem 1rem;
    }

    .result-badge {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.35rem 1.1rem;
      border-radius: 99px;
      margin-bottom: 1rem;
    }
    .badge-entry   { background: rgba(0,200,83,0.15);  color: #69f0ae; border: 1px solid #69f0ae; }
    .badge-exit    { background: rgba(255,171,0,0.12); color: #ffca28; border: 1px solid #ffca28; }
    .badge-expired { background: rgba(198,40,40,0.15); color: #ef9a9a; border: 1px solid #ef9a9a; }

    .result-id {
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: -2px;
      color: #fff;
      margin-bottom: 0.5rem;
      word-break: break-all;
      line-height: 1;
    }

    .result-msg { font-size: 1.2rem; font-weight: 600; color: #bbb; margin-bottom: 2rem; }

    .clock-block {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border-radius: 14px;
      padding: 1.2rem 1rem;
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
    }
    .clock-label { font-size: 0.65rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.1em; }
    #live-clock {
      font-size: 2.8rem;
      font-weight: 900;
      font-family: 'Courier New', monospace;
      font-variant-numeric: tabular-nums;
      color: #fff;
      letter-spacing: 2px;
    }

    .countdown-block {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
    }
    .countdown-label { font-size: 0.65rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.1em; }
    #countdown {
      font-size: 1.8rem;
      font-weight: 800;
      font-family: 'Courier New', monospace;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      transition: color 0.5s;
    }
    #countdown.urgent { color: #ef9a9a !important; }

    #back-btn { background: rgba(255,255,255,0.08); font-size: 0.9rem; font-weight: 600; padding: 0.75rem; }
    #back-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="flash-overlay"></div>

  <!-- Form -->
  <div id="form-screen">
    <h1>⚡ Chik-Check</h1>
    <p class="tagline">כניסה / יציאה מהירה</p>
    <div class="card">
      <label for="id-input">תעודת זהות / מספר מזהה</label>
      <input id="id-input" type="tel" inputmode="numeric" pattern="[0-9]*"
             placeholder="הכנס מספר זהות" autocomplete="off" />

      <label for="key-input">קוד שער (Gate Key)</label>
      <input id="key-input" type="text" placeholder="הקוד שעל השלט" autocomplete="off" />

      <button id="submit-btn" onclick="handleSubmit()">אמת ✓</button>
      <p class="error-msg" id="error-msg"></p>
    </div>
  </div>

  <!-- Result -->
  <div id="result-screen">
    <div class="result-badge" id="result-badge"></div>
    <div class="result-id"    id="result-id"></div>
    <div class="result-msg"   id="result-msg"></div>

    <div class="clock-block">
      <div class="clock-label">שעה נוכחית</div>
      <div id="live-clock">00:00:00</div>
    </div>

    <div class="countdown-block">
      <div class="countdown-label">תוקף אישור</div>
      <div id="countdown">05:00</div>
    </div>

    <button id="back-btn" onclick="resetToForm()">← חזרה</button>
  </div>

<script>
  // ── State ──────────────────────────────────────────────
  var clockInterval   = null;
  var countdownInterval = null;
  var countdownEnd    = null;   // wall-clock ms when countdown expires
  var expiredTimeout  = null;   // handle for showExpired auto-reset
  var gasTimeout      = null;   // handle for GAS no-response guard
  var inFlight        = false;  // prevents double-submit

  var COUNTDOWN_MS    = 5 * 60 * 1000;
  var GAS_TIMEOUT_MS  = 15000;  // 15s — if GAS hasn't responded, unlock the button

  // ── Testable pure functions ────────────────────────────
  // Exported on window so timer.test.js can import them.

  function pad(n) { return String(Math.max(0, Math.floor(n))).padStart(2, '0'); }

  function formatCountdown(totalSeconds) {
    var s = Math.max(0, Math.floor(totalSeconds));
    return pad(Math.floor(s / 60)) + ':' + pad(s % 60);
  }

  // Resolves SUCCESS response → display options. Pure, no DOM side-effects.
  function resolveDirection(res) {
    var isEntry = res.direction === 'entry';
    return {
      bgClass:        isEntry ? 'bg-entry'    : 'bg-exit',
      flashClass:     isEntry ? 'flash-green' : 'flash-amber',
      badgeClass:     isEntry ? 'badge-entry' : 'badge-exit',
      badgeText:      isEntry ? '⬆ כניסה'    : '⬇ יציאה',
      msg:            isEntry ? 'כניסה מאושרת ✓' : 'יציאה מאושרת ✓',
      countdownColor: isEntry ? '#69f0ae'     : '#ffca28'
    };
  }

  // ── Submit ────────────────────────────────────────────
  function handleSubmit() {
    if (inFlight) return;  // double-submit guard

    var id    = document.getElementById('id-input').value.trim();
    var key   = document.getElementById('key-input').value.trim();
    var errEl = document.getElementById('error-msg');
    errEl.textContent = '';

    if (!id || !key) { errEl.textContent = 'יש למלא את כל השדות.'; return; }

    inFlight = true;
    var btn = document.getElementById('submit-btn');
    btn.disabled  = true;
    btn.innerHTML = '<span class="spinner"></span>בודק...';

    // Safety net: if GAS never responds, unlock the form after GAS_TIMEOUT_MS
    gasTimeout = setTimeout(function() {
      resetBtn();
      document.getElementById('error-msg').textContent = 'אין תגובה מהשרת. נסה שוב.';
    }, GAS_TIMEOUT_MS);

    google.script.run
      .withSuccessHandler(handleResult)
      .withFailureHandler(handleNetworkError)
      .checkIn(id, key);
  }

  // ── Handlers ──────────────────────────────────────────
  function handleResult(res) {
    clearTimeout(gasTimeout);
    resetBtn();

    if (res.status === 'SUCCESS') {
      var opts = resolveDirection(res);
      showResult(res.id, opts);
      return;
    }

    flashOverlay('flash-red');
    document.getElementById('error-msg').textContent =
      res.status === 'INVALID_KEY' ? 'קוד שער שגוי.'
      : res.status === 'NOT_FOUND' ? 'מספר זהות לא נמצא ברשימה.'
      : 'שגיאה: ' + (res.message || res.status);
  }

  function handleNetworkError() {
    clearTimeout(gasTimeout);
    resetBtn();
    flashOverlay('flash-red');
    document.getElementById('error-msg').textContent = 'שגיאת תקשורת. נסה שוב.';
  }

  // ── Show result ───────────────────────────────────────
  function showResult(id, opts) {
    document.getElementById('form-screen').style.display   = 'none';
    document.getElementById('result-screen').style.display = 'flex';

    setBodyBg(opts.bgClass);
    flashOverlay(opts.flashClass);

    var badge = document.getElementById('result-badge');
    badge.className   = 'result-badge ' + opts.badgeClass;
    badge.textContent = opts.badgeText;

    document.getElementById('result-id').textContent  = id;
    document.getElementById('result-msg').textContent = opts.msg;
    document.getElementById('countdown').style.color  = opts.countdownColor;

    startLiveClock();
    startCountdown(COUNTDOWN_MS);
  }

  // ── Body background ───────────────────────────────────
  function setBodyBg(cls) {
    document.body.classList.remove('bg-entry', 'bg-exit');
    if (cls) document.body.classList.add(cls);
  }

  // ── Flash overlay ─────────────────────────────────────
  function flashOverlay(cls) {
    var el = document.getElementById('flash-overlay');
    el.className = '';
    void el.offsetWidth;
    el.className = cls;
  }

  // ── Live clock (always wall-clock accurate) ───────────
  function startLiveClock() {
    stopLiveClock();
    tickClock();
    clockInterval = setInterval(tickClock, 1000);
  }
  function tickClock() {
    var now = new Date();
    document.getElementById('live-clock').textContent =
      pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  }
  function stopLiveClock() {
    if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
  }

  // ── Countdown (wall-clock based — immune to sleep/background) ──
  // Polls every 500ms but calculates remaining from wall-clock, not tick count.
  // This means phone sleep or tab backgrounding can't make it run slow.
  function startCountdown(durationMs) {
    stopCountdown();
    countdownEnd = Date.now() + durationMs;
    tickCountdown();
    countdownInterval = setInterval(tickCountdown, 500);
  }
  function tickCountdown() {
    var remainingMs = countdownEnd - Date.now();
    var remainingSec = Math.max(0, Math.ceil(remainingMs / 1000));
    var el = document.getElementById('countdown');
    el.textContent = formatCountdown(remainingSec);
    el.classList.toggle('urgent', remainingSec <= 30);
    if (remainingMs <= 0) { stopCountdown(); showExpired(); }
  }
  function stopCountdown() {
    if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
  }

  // ── Expired ───────────────────────────────────────────
  function showExpired() {
    stopLiveClock();

    document.getElementById('result-badge').className   = 'result-badge badge-expired';
    document.getElementById('result-badge').textContent = '⏱ פג תוקף';
    document.getElementById('result-msg').textContent   = 'האישור פקע — יש לאמת מחדש';
    document.getElementById('countdown').textContent    = '00:00';
    document.getElementById('live-clock').textContent   = '--:--:--';

    setBodyBg(null);
    flashOverlay('flash-red');

    expiredTimeout = setTimeout(resetToForm, 2500);
  }

  // ── Reset ─────────────────────────────────────────────
  function resetToForm() {
    clearTimeout(expiredTimeout);
    expiredTimeout = null;
    stopLiveClock();
    stopCountdown();
    setBodyBg(null);

    document.getElementById('flash-overlay').className  = '';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('form-screen').style.display   = 'block';
    document.getElementById('countdown').classList.remove('urgent');
    document.getElementById('id-input').value  = '';
    document.getElementById('key-input').value = '';
    document.getElementById('error-msg').textContent = '';
    document.getElementById('id-input').focus();
  }

  function resetBtn() {
    inFlight = false;
    var btn = document.getElementById('submit-btn');
    btn.disabled  = false;
    btn.innerHTML = 'אמת ✓';
  }

  window.addEventListener('load', function() { document.getElementById('id-input').focus(); });
</script>
</body>
</html>
