<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Chik-Check ⚡</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* ── Form screen ── */
    h1 { font-size: 2rem; font-weight: 800; letter-spacing: -1px; color: #fff; margin-bottom: 0.2rem; }
    .tagline { font-size: 0.85rem; color: #666; margin-bottom: 2rem; }

    .card {
      background: #1c1c1e;
      border-radius: 16px;
      padding: 1.75rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    label {
      display: block;
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 10px;
      border: 1.5px solid #333;
      background: #2a2a2e;
      color: #fff;
      font-size: 1.1rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input:focus { border-color: #2563eb; }
    input::placeholder { color: #555; }

    button {
      width: 100%;
      padding: 1rem;
      border-radius: 10px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    button:hover:not(:disabled) { background: #1d4ed8; }
    button:active:not(:disabled) { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg { color: #ff6b6b; font-size: 0.85rem; margin-top: 0.6rem; text-align: center; min-height: 1.2em; }

    /* ── Result screen ── */
    #result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 100%;
      max-width: 420px;
      padding: 2rem 1rem;
    }

    .result-badge {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.35rem 1.1rem;
      border-radius: 99px;
      margin-bottom: 1rem;
    }
    .badge-entry   { background: rgba(0,200,83,0.15);  color: #00e676; border: 1px solid #00e676; }
    .badge-exit    { background: rgba(255,196,0,0.12); color: #ffd740; border: 1px solid #ffd740; }
    .badge-expired { background: rgba(255,82,82,0.15); color: #ff5252; border: 1px solid #ff5252; }

    .result-id {
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: -2px;
      color: #fff;
      margin-bottom: 0.5rem;
      word-break: break-all;
      line-height: 1;
    }

    .result-msg {
      font-size: 1.2rem;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 2rem;
    }

    /* ── Clock block ── */
    .clock-block {
      width: 100%;
      background: #1c1c1e;
      border-radius: 14px;
      padding: 1.2rem 1rem;
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
    }
    .clock-label {
      font-size: 0.65rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    #live-clock {
      font-size: 2.8rem;
      font-weight: 900;
      font-family: 'Courier New', monospace;
      font-variant-numeric: tabular-nums;
      color: #fff;
      letter-spacing: 2px;
    }

    /* ── Countdown block ── */
    .countdown-block {
      width: 100%;
      background: #1c1c1e;
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
    }
    .countdown-label { font-size: 0.65rem; color: #555; text-transform: uppercase; letter-spacing: 0.1em; }
    #countdown {
      font-size: 1.8rem;
      font-weight: 800;
      font-family: 'Courier New', monospace;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
    }
    #countdown.urgent { color: #ff5252; }

    #back-btn {
      background: rgba(255,255,255,0.08);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.75rem;
    }
    #back-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); }

    /* ── Flash animations ── */
    @keyframes flash-green  { 0%,100%{background:#007e33} 40%{background:#00e676} }
    @keyframes flash-yellow { 0%,100%{background:#ff8f00} 40%{background:#ffd740} }
    @keyframes flash-red    { 0%,100%{background:#b71c1c} 40%{background:#ff5252} }

    body.flash-green  { animation: flash-green  0.35s ease 3; }
    body.flash-yellow { animation: flash-yellow 0.35s ease 3; }
    body.flash-red    { animation: flash-red    0.35s ease 3; }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- ── Entry Form ── -->
  <div id="form-screen">
    <h1>⚡ Chik-Check</h1>
    <p class="tagline">כניסה / יציאה מהירה</p>

    <div class="card">
      <label for="id-input">תעודת זהות / מספר מזהה</label>
      <input id="id-input" type="tel" inputmode="numeric" pattern="[0-9]*"
             placeholder="הכנס מספר זהות" autocomplete="off" />

      <label for="key-input">קוד שער (Gate Key)</label>
      <input id="key-input" type="text" placeholder="הקוד שעל השלט" autocomplete="off" />

      <button id="submit-btn" onclick="handleSubmit()">אמת ✓</button>
      <p class="error-msg" id="error-msg"></p>
    </div>
  </div>

  <!-- ── Result Screen ── -->
  <div id="result-screen">
    <div class="result-badge" id="result-badge"></div>
    <div class="result-id"    id="result-id"></div>
    <div class="result-msg"   id="result-msg"></div>

    <!-- Live clock — proves screen is running RIGHT NOW -->
    <div class="clock-block">
      <div class="clock-label">שעה נוכחית</div>
      <div id="live-clock">00:00:00</div>
    </div>

    <!-- Countdown — expires the approval after 5 minutes -->
    <div class="countdown-block">
      <div class="countdown-label">תוקף אישור</div>
      <div id="countdown">05:00</div>
    </div>

    <button id="back-btn" onclick="resetToForm()">← חזרה</button>
  </div>

<script>
  var clockInterval    = null;
  var countdownInterval = null;
  var COUNTDOWN_SECONDS = 5 * 60;

  // ── Submit ──────────────────────────────────────────────
  function handleSubmit() {
    var id  = document.getElementById('id-input').value.trim();
    var key = document.getElementById('key-input').value.trim();
    var errEl = document.getElementById('error-msg');
    errEl.textContent = '';

    if (!id || !key) { errEl.textContent = 'יש למלא את כל השדות.'; return; }

    var btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>בודק...';

    google.script.run
      .withSuccessHandler(handleResult)
      .withFailureHandler(handleError)
      .checkIn(id, key);
  }

  // ── Handle server response ────────────────────────────
  function handleResult(res) {
    resetBtn();

    if (res.status === 'SUCCESS') {
      var isEntry = res.direction === 'entry';
      showResult({
        badgeClass: isEntry ? 'badge-entry' : 'badge-exit',
        badgeText:  isEntry ? '⬆ כניסה'    : '⬇ יציאה',
        id:         res.id,
        msg:        isEntry ? 'כניסה מאושרת ✓' : 'יציאה מאושרת ✓',
        flashClass: isEntry ? 'flash-green' : 'flash-yellow',
        countdownColor: isEntry ? '#00e676' : '#ffd740'
      });
      return;
    }

    if (res.status === 'NOT_FOUND') {
      flash('flash-red');
      document.getElementById('error-msg').textContent = 'מספר זהות לא נמצא ברשימה.';
      return;
    }
    if (res.status === 'INVALID_KEY') {
      flash('flash-red');
      document.getElementById('error-msg').textContent = 'קוד שער שגוי.';
      return;
    }
    flash('flash-red');
    document.getElementById('error-msg').textContent = 'שגיאה: ' + (res.message || res.status);
  }

  function handleError() {
    resetBtn();
    flash('flash-red');
    document.getElementById('error-msg').textContent = 'שגיאת תקשורת. נסה שוב.';
  }

  // ── Show result screen ────────────────────────────────
  function showResult(opts) {
    document.getElementById('form-screen').style.display   = 'none';
    document.getElementById('result-screen').style.display = 'flex';

    var badge = document.getElementById('result-badge');
    badge.className = 'result-badge ' + opts.badgeClass;
    badge.textContent = opts.badgeText;

    document.getElementById('result-id').textContent  = opts.id;
    document.getElementById('result-msg').textContent = opts.msg;

    document.getElementById('countdown').style.color = opts.countdownColor;

    flash(opts.flashClass);
    startLiveClock();
    startCountdown(COUNTDOWN_SECONDS);
  }

  // ── Live clock (local phone time) ────────────────────
  function startLiveClock() {
    stopLiveClock();
    tickClock();
    clockInterval = setInterval(tickClock, 1000);
  }

  function tickClock() {
    var now = new Date();
    var h = pad(now.getHours());
    var m = pad(now.getMinutes());
    var s = pad(now.getSeconds());
    document.getElementById('live-clock').textContent = h + ':' + m + ':' + s;
  }

  function stopLiveClock() {
    if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
  }

  // ── Countdown ─────────────────────────────────────────
  function startCountdown(total) {
    stopCountdown();
    var remaining = total;
    updateCountdownEl(remaining);
    countdownInterval = setInterval(function() {
      remaining--;
      updateCountdownEl(remaining);
      if (remaining <= 0) { stopCountdown(); showExpired(); }
    }, 1000);
  }

  function updateCountdownEl(secs) {
    var el = document.getElementById('countdown');
    el.textContent = pad(Math.floor(secs / 60)) + ':' + pad(secs % 60);
    el.classList.toggle('urgent', secs <= 30);
  }

  function stopCountdown() {
    if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
  }

  // ── Helpers ───────────────────────────────────────────
  function flash(cls) {
    document.body.classList.remove('flash-green', 'flash-yellow', 'flash-red');
    void document.body.offsetWidth;
    document.body.classList.add(cls);
    setTimeout(function() { document.body.classList.remove(cls); }, 1200);
  }

  function resetBtn() {
    var btn = document.getElementById('submit-btn');
    btn.disabled = false;
    btn.innerHTML = 'אמת ✓';
  }

  function resetToForm() {
    stopLiveClock();
    stopCountdown();
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('form-screen').style.display   = 'block';
    document.getElementById('id-input').value  = '';
    document.getElementById('key-input').value = '';
    document.getElementById('error-msg').textContent = '';
    document.getElementById('id-input').focus();
  }

  // ── Expired state ─────────────────────────────────────
  function showExpired() {
    stopLiveClock();

    // Overwrite result screen content with expiry message
    document.getElementById('result-badge').textContent  = '⏱ פג תוקף';
    document.getElementById('result-badge').className    = 'result-badge badge-expired';
    document.getElementById('result-msg').textContent    = 'האישור פקע. יש לאמת מחדש.';
    document.getElementById('countdown').textContent     = '00:00';
    document.getElementById('countdown').style.color    = '#ff5252';
    document.getElementById('live-clock').textContent   = '--:--:--';

    // Flash red + freeze clock display
    document.body.classList.remove('flash-green', 'flash-yellow', 'flash-red');
    void document.body.offsetWidth;
    document.body.classList.add('flash-red');

    // Auto-reset to form after 3 seconds
    setTimeout(function() {
      document.body.classList.remove('flash-red');
      resetToForm();
    }, 3000);
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  window.addEventListener('load', function() { document.getElementById('id-input').focus(); });
</script>
</body>
</html>
